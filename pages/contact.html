<!DOCTYPE html>
<!-- ============================================================
     PAGE: Contact  (pages/contact.html)
     ============================================================ -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Constrovet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

  <div id="cv-nav-placeholder"></div>

  <main>

    <div class="cv-hero-band">
      <h1>Get in Touch</h1>
      <p>Ready to stop cost bleeding? Contact our audit integration team.</p>
    </div>

    <section class="cv-section cv-section--bg-slate">
      <div style="max-width:640px;margin:0 auto;">
        <div class="cv-card">
          <!-- FormSubmit — edit _next value to your live domain once deployed -->
          <form
            action="https://formsubmit.co/d4ede1b93527b459dc26650d91750893"
            method="POST"
            class="cv-form">

            <!-- FormSubmit config hidden fields -->
            <input type="hidden" name="_next"    value="https://www.constrovet.com">
            <input type="hidden" name="_subject" value="New Contact Inquiry from Constrovet Website!">
            <input type="hidden" name="_captcha" value="false">

            <div class="cv-form__row">
              <div>
                <label for="first-name">First name *</label>
                <input type="text" id="first-name" name="FirstName" required autocomplete="given-name">
              </div>
              <div>
                <label for="last-name">Last name *</label>
                <input type="text" id="last-name" name="LastName" required autocomplete="family-name">
              </div>
            </div>

            <div>
              <label for="email">Work Email *</label>
              <input type="email" id="email" name="Email" required autocomplete="email">
            </div>

            <div>
              <label for="company">Company / Organization</label>
              <input type="text" id="company" name="Company" autocomplete="organization">
            </div>

            <div>
              <label for="message">Project Details / Inquiry *</label>
              <textarea id="message" name="Message" rows="5" required></textarea>
            </div>

            <button type="submit" class="cv-btn cv-btn--primary" style="width:100%;justify-content:center;">
              Send Message
            </button>

          </form>
        </div>
      </div>
    </section>

  </main>

  <div id="cv-footer-placeholder"></div>
  <script src="../assets/js/main.js"></script>
</body>
</html>
